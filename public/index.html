<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Smawl</title>
	<meta name="description"
		content="A fast, simple URL shortener. Paste a long URL, get a short one. Custom IDs supported." />
	<meta name="author" content="Peter Benoit" />
	<meta name="robots" content="index, follow" />

	<!-- Open Graph -->
	<meta property="og:title" content="Smawl" />
	<meta property="og:description" content="A fast, simple URL shortener. Paste a long URL, get a short one." />
	<meta property="og:type" content="website" />
	<meta property="og:image" content="/icons/og-image.jpg" />

	<!-- Twitter Card -->
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:title" content="Smawl" />
	<meta name="twitter:description" content="A fast, simple URL shortener. Paste a long URL, get a short one." />
	<meta name="twitter:image" content="/icons/og-image.jpg" />

	<!-- Favicon & Icons -->
	<link rel="icon" type="image/x-icon" href="/icons/favicon.ico" />
	<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
	<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
	<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
	<link rel="manifest" href="/site.webmanifest" />
	<meta name="msapplication-TileImage" content="/icons/mstile-150x150.png" />
	<meta name="msapplication-TileColor" content="#0f172a" />
	<meta name="theme-color" content="#0f172a" />

	<!-- Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap"
		rel="stylesheet" />

	<!-- Tailwind CDN -->
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					fontFamily: {
						inter: ['Inter', 'sans-serif'],
						outfit: ['Outfit', 'sans-serif'],
					}
				}
			}
		}
	</script>

	<style>
		body {
			font-family: 'Inter', sans-serif;
		}

		/* JS-rendered class names — styled here since JS uses className strings */

		.custom-id-container {
			display: none;
		}

		.custom-id-container.visible {
			display: block;
		}

		.share-success {
			opacity: 0;
			transition: opacity 0.3s;
			font-size: 0.85rem;
			color: #4ade80;
			margin-top: 0.4rem;
		}

		.share-success.visible {
			opacity: 1;
		}

		.share-buttons {
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 0.5rem;
			margin-top: 1rem;
			flex-wrap: wrap;
		}

		.copy-button {
			display: inline-flex;
			align-items: center;
			gap: 0.35rem;
			background: rgb(51 65 85 / 0.8);
			color: #e2e8f0;
			border: 1px solid rgb(71 85 105);
			border-radius: 0.6rem;
			font-size: 0.8rem;
			padding: 0.35rem 0.85rem;
			cursor: pointer;
			font-family: 'Inter', sans-serif;
			transition: background 0.15s, border-color 0.15s;
		}

		.copy-button:hover {
			background: rgb(71 85 105);
			border-color: rgb(100 116 139);
		}

		/* Table: stats cards */
		.stats-card {
			flex: 1;
			min-width: 110px;
			padding: 1rem 1.2rem;
			border-radius: 0.75rem;
			background: #0f172a;
			border: 1px solid rgb(51 65 85);
			text-align: center;
		}

		.stats-card .stats-value {
			font-family: 'Outfit', sans-serif;
			font-size: 1.75rem;
			font-weight: 700;
			color: #e2e8f0;
			line-height: 1;
		}

		.stats-card .stats-value a {
			color: #60a5fa;
			text-decoration: none;
		}

		.stats-card .stats-value a:hover {
			text-decoration: underline;
		}

		.stats-card .stats-label {
			font-size: 0.75rem;
			color: #64748b;
			margin-top: 0.3rem;
			font-weight: 500;
			text-transform: uppercase;
			letter-spacing: 0.05em;
		}

		/* Table */
		#my-links-table-container {
			overflow-x: auto;
		}

		#my-links-table-container table {
			width: 100%;
			border-collapse: collapse;
			font-size: 0.8125rem;
		}

		#my-links-table-container th,
		#my-links-table-container td {
			padding: 0.6rem 0.85rem;
			text-align: left;
			border-bottom: 1px solid rgb(51 65 85 / 0.5);
		}

		#my-links-table-container th {
			font-weight: 600;
			color: #94a3b8;
			white-space: nowrap;
			user-select: none;
			font-size: 0.75rem;
			text-transform: uppercase;
			letter-spacing: 0.05em;
		}

		#my-links-table-container th:hover {
			color: #fbbf24;
			cursor: pointer;
		}

		#my-links-table-container td {
			color: #cbd5e1;
			vertical-align: middle;
		}

		#my-links-table-container td a {
			color: #60a5fa;
			text-decoration: none;
		}

		#my-links-table-container td a:hover {
			text-decoration: underline;
		}

		#my-links-table-container tr:hover td {
			background: rgb(30 41 59 / 0.4);
		}

		.link-label {
			display: inline-block;
			min-width: 70px;
			border-radius: 4px;
			padding: 1px 5px;
			color: #94a3b8;
			font-style: italic;
			transition: background 0.15s, outline 0.15s;
		}

		.link-label:empty::before {
			content: 'add label…';
			color: #475569;
		}

		.link-label:focus {
			outline: 1px solid #f59e0b;
			background: rgb(245 158 11 / 0.08);
			color: #e2e8f0;
			font-style: normal;
		}

		.col-clicks {
			text-align: right;
			font-variant-numeric: tabular-nums;
		}

		.col-actions {
			white-space: nowrap;
		}

		.action-btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			font-size: 0.75rem;
			padding: 0.25rem 0.6rem;
			border-radius: 0.45rem;
			font-family: 'Inter', sans-serif;
			font-weight: 500;
			cursor: pointer;
			border: 1px solid transparent;
			transition: background 0.15s, border-color 0.15s, color 0.15s;
			margin-right: 0.2rem;
		}

		.btn-copy {
			background: rgb(30 41 59);
			color: #cbd5e1;
			border-color: rgb(51 65 85);
		}

		.btn-copy:hover {
			background: rgb(51 65 85);
		}

		.btn-qr {
			background: rgb(96 165 250 / 0.1);
			color: #60a5fa;
			border-color: rgb(96 165 250 / 0.25);
		}

		.btn-qr:hover {
			background: rgb(96 165 250 / 0.2);
			border-color: rgb(96 165 250 / 0.5);
		}

		.btn-remove {
			background: transparent;
			color: #f87171;
			border-color: rgb(239 68 68 / 0.3);
		}

		.btn-remove:hover {
			background: rgb(239 68 68 / 0.15);
			border-color: #f87171;
		}

		/* QR modal */
		#qr-modal-overlay {
			position: fixed;
			inset: 0;
			background: rgb(2 6 23 / 0.75);
			backdrop-filter: blur(4px);
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 1000;
		}

		#qr-modal-overlay[hidden] {
			display: none;
		}

		#qr-modal-box {
			background: #0f172a;
			border: 1px solid rgb(51 65 85);
			border-radius: 1.25rem;
			padding: 2rem;
			text-align: center;
			max-width: 300px;
			width: 90%;
			box-shadow: 0 20px 60px rgb(0 0 0 / 0.5);
		}

		#qr-canvas-container canvas,
		#qr-canvas-container img {
			border-radius: 0.5rem;
		}

		#qr-modal-url {
			font-size: 0.75rem;
			word-break: break-all;
			color: #64748b;
			margin: 0.75rem 0 0;
		}

		#qr-modal-close {
			margin-top: 1rem;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 0.4rem 1.4rem;
			border-radius: 0.6rem;
			font-size: 0.8rem;
			background: rgb(30 41 59);
			color: #cbd5e1;
			border: 1px solid rgb(51 65 85);
			cursor: pointer;
			font-family: 'Inter', sans-serif;
			transition: background 0.15s;
		}

		#qr-modal-close:hover {
			background: rgb(51 65 85);
		}

		/* Bento card hover accent */
		.bento-card {
			transition: border-color 0.2s;
		}

		.bento-card:hover {
			border-color: rgb(245 158 11 / 0.3);
		}

		/* Short URL result link */
		#shorten-result a {
			color: #fbbf24;
			font-weight: 600;
			text-decoration: none;
			font-size: 1rem;
		}

		#shorten-result a:hover {
			text-decoration: underline;
		}

		.table-empty {
			padding: 2.5rem 1.5rem;
			text-align: center;
			color: #475569;
			font-size: 0.875rem;
		}
	</style>

	<!-- Google Analytics -->
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-GQEC09BG5Z"></script>
	<script>window.dataLayer = window.dataLayer || []; function gtag() { dataLayer.push(arguments); } gtag('js', new Date()); gtag('config', 'G-GQEC09BG5Z');</script>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen">

	<!-- QR modal -->
	<div id="qr-modal-overlay" hidden>
		<div id="qr-modal-box">
			<div id="qr-canvas-container"></div>
			<p id="qr-modal-url"></p>
			<button id="qr-modal-close">Close</button>
		</div>
	</div>

	<div class="w-full max-w-4xl mx-auto px-4 pt-8 pb-16 flex flex-col gap-5">

		<!-- Shortener panel -->
		<div class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
			<div class="flex items-start justify-between mb-5">
				<div>
					<h1 class="font-outfit font-bold text-2xl text-white tracking-tight">Smawl</h1>
					<p class="text-slate-500 text-sm mt-0.5">Shorten a URL. Links are saved in your browser.</p>
				</div>
			</div>

			<form id="shorten-form" autocomplete="off" class="flex flex-col gap-3">
				<div class="flex gap-2 flex-wrap">
					<input type="url" id="url-input" name="url" required
						placeholder="https://example.com/very/long/path/to/something" aria-label="Enter URL to shorten"
						class="flex-1 min-w-0 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500/70 focus:ring-1 focus:ring-blue-500/20 text-sm" />
					<button type="submit"
						class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg font-semibold transition-colors text-sm bg-blue-600 hover:bg-blue-500 text-white whitespace-nowrap">
						Shorten
					</button>
				</div>
				<div class="flex items-center gap-3">
					<label class="flex items-center gap-2 text-sm text-slate-400 cursor-pointer select-none">
						<input type="checkbox" id="use-custom-id" class="rounded accent-blue-500" />
						Use custom ID
					</label>
					<div class="custom-id-container" id="custom-id-container">
						<input type="text" id="custom-id-input" name="customId" placeholder="myLink123"
							pattern="[a-zA-Z0-9]{3,10}" maxlength="10" title="3 to 10 alphanumeric characters only"
							aria-label="Enter custom identifier"
							class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500/70 text-sm w-40" />
					</div>
				</div>
			</form>

			<div id="shorten-result" class="mt-4 text-center text-sm break-all"></div>
		</div>

		<!-- Stats row — always visible -->
		<div id="my-links-stats-cards" class="grid grid-cols-3 gap-4"></div>

		<!-- My Links table panel — always visible -->
		<section id="my-links-section">
			<div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
				<div class="flex items-center justify-between px-6 py-4 border-b border-slate-800">
					<h2 class="font-outfit font-semibold text-base text-white">My Links</h2>
					<div id="my-links-actions-bar"></div>
				</div>
				<div id="my-links-table-container"></div>
			</div>
		</section>

		<!-- Footer -->
		<footer class="text-center text-xs text-slate-500 pt-2">
			Built by <a href="https://peterbenoit.com" target="_blank" rel="noopener noreferrer"
				class="text-slate-400 hover:text-slate-200 transition-colors">Peter Benoit</a>.
			&copy; 2026.
		</footer>

	</div>

	<script src="/main.js" defer></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
	<script src="https://peterbenoit.com/js/badge.js" data-mode="tracker"></script>
</body>

</html>
